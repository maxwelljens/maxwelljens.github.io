baseURL: https://maxwelljensen.eu/
title: Maxwell Jensen's Personal Website
theme: [PaperMod]
copyright: "© Maxwell Jensen"
module:
  imports:
    - path: github.com/martignoni/hugo-notice

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts", "testimonial"]

minify:
  disableXML: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

defaultContentLanguage: en
languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Posts
          url: /posts
          weight: 5
        - name: Search
          url: search/
          weight: 10
        - name: Tags
          url: tags/
          weight: 15
    params:
      profileMode:
        enabled: true
        title: Maxwell Jensen
