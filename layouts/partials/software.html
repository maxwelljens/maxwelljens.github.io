<section class="software-section" aria-label="Software">
  <div class="software-layout">
    <div class="software-info" id="software-info" role="tabpanel">
      {{- range $index, $repo := . }}
      <div class="software-info-content{{ if gt $index 0 }} hidden{{ end }}" data-index="{{ $index }}"></div>
      {{- end }}
    </div>

    <div class="software-buttons" role="tablist" aria-label="Software projects">
      {{- range $index, $repo := . }}
      <button class="software-card{{ if eq $index 0 }} active{{ end }}"
              data-index="{{ $index }}"
              data-name="{{ $repo.name }}"
              data-description="{{ $repo.description }}"
              data-url="{{ $repo.url }}"
              {{- if $repo.topics }}
              data-topics="{{ delimit $repo.topics "," }}"
              {{- end }}
              role="tab"
              aria-selected="{{ if eq $index 0 }}true{{ else }}false{{ end }}"
              aria-controls="software-info"
              tabindex="{{ if eq $index 0 }}0{{ else }}-1{{ end }}">
        <div class="software-card-header">
          <div class="software-card-title-row">
            <h3 class="software-card-title">{{ $repo.name }}</h3>
            <a href="{{ $repo.url }}" class="software-card-link" target="_blank" rel="noopener" aria-label="View {{ $repo.name }} repository" onclick="event.stopPropagation()">
              <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
            </a>
          </div>
        </div>
        {{- if $repo.description }}
        <p class="software-card-description">{{ $repo.description }}</p>
        {{- end }}
        {{- if $repo.topics }}
        <ul class="software-card-topics">
          {{- range first 4 $repo.topics }}
          <li>{{ . }}</li>
          {{- end }}
        </ul>
        {{- end }}
      </button>
      {{- end }}
    </div>
  </div>

  {{- partial "logo_marquee.html" . }}
</section>

<script>
(function() {
  const buttons = document.querySelectorAll('.software-card');
  const infoPanels = document.querySelectorAll('.software-info-content');
  let currentIndex = 0;
  let initialized = false;

  function activateSoftware(button) {
    const name = button.dataset.name;
    const description = button.dataset.description;
    const url = button.dataset.url;
    const topicsStr = button.dataset.topics;
    const buttonIndex = parseInt(button.dataset.index);

    buttons.forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-selected', 'false');
      b.setAttribute('tabindex', '-1');
    });
    button.classList.add('active');
    button.setAttribute('aria-selected', 'true');
    button.setAttribute('tabindex', '0');

    const oldPanel = infoPanels[currentIndex];
    const newPanel = infoPanels[buttonIndex];

    if (!initialized) {
      initialized = true;
      oldPanel.innerHTML = '<h2 class="software-info-title">' + name + '</h2><p class="software-info-description">' + (description || '') + '</p><ul class="software-info-topics">' + (topicsStr ? topicsStr.split(',').map(t => '<li>' + t + '</li>').join('') : '') + '</ul><a href="' + url + '" class="software-info-link" target="_blank" rel="noopener"><span>View Repository</span><i class="fa-solid fa-arrow-right" aria-hidden="true"></i></a>';
      oldPanel.classList.remove('hidden');
      currentIndex = buttonIndex;
      return;
    }

    if (buttonIndex === currentIndex) return;

    const title = newPanel.querySelector('.software-info-title') || document.createElement('h2');
    title.className = 'software-info-title';
    title.textContent = name;

    const desc = newPanel.querySelector('.software-info-description') || document.createElement('p');
    desc.className = 'software-info-description';
    desc.textContent = description || '';

    const topics = newPanel.querySelector('.software-info-topics') || document.createElement('ul');
    topics.className = 'software-info-topics';
    if (topicsStr) {
      topics.innerHTML = topicsStr.split(',').map(t => '<li>' + t + '</li>').join('');
    } else {
      topics.innerHTML = '';
    }

    const link = newPanel.querySelector('.software-info-link') || document.createElement('a');
    link.className = 'software-info-link';
    link.href = url;
    link.target = '_blank';
    link.rel = 'noopener';
    link.innerHTML = '<span>View Repository</span><i class="fa-solid fa-arrow-right" aria-hidden="true"></i>';

    newPanel.innerHTML = '';
    newPanel.appendChild(title);
    newPanel.appendChild(desc);
    newPanel.appendChild(topics);
    newPanel.appendChild(link);

    oldPanel.classList.add('hidden');
    newPanel.classList.remove('hidden');

    currentIndex = buttonIndex;
  }

  buttons.forEach(button => {
    button.addEventListener('click', function(e) {
      if (e.target.closest('.software-card-link')) return;
      activateSoftware(this);
    });

    button.addEventListener('keydown', function(e) {
      const currentIndex = parseInt(this.dataset.index);
      let targetIndex = null;

      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        targetIndex = (currentIndex + 1) % buttons.length;
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        targetIndex = (currentIndex - 1 + buttons.length) % buttons.length;
      } else if (e.key === 'Home') {
        targetIndex = 0;
      } else if (e.key === 'End') {
        targetIndex = buttons.length - 1;
      }

      if (targetIndex !== null) {
        e.preventDefault();
        buttons[targetIndex].focus();
        activateSoftware(buttons[targetIndex]);
      }
    });
  });

  const activeButton = document.querySelector('.software-card.active');
  if (activeButton) {
    activateSoftware(activeButton);
  }
})();
</script>
