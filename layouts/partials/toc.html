{{- if .Content -}}
{{- $headers := findRE "<h[1-6].*?>(.|\n])+?</h[1-6]>" .Content -}}
{{- $has_headers := ge (len $headers) 1 -}}
{{- if $has_headers -}}
<details class="floating-toc" open>
    <summary accesskey="c" title="(Alt + C)">
        <span class="details">{{- i18n "toc" | default "Table of Contents" }}</span>
    </summary>
    <div class="inner">
        {{ .TableOfContents }}
    </div>
</details>
{{- end -}}
{{- end -}}
